<script>
(function(){
    var form   = document.getElementById('ct-form');
    var thanks = document.getElementById('ct-thanks');
    var fwrap  = document.getElementById('ct-form-wrap');
    if (!form) return;

    var errClass = 'c-880203';
    var grpClass = 'y-8fe342';

    function validate(id, checkFn) {
        var g  = document.getElementById('ctg-' + id);
        var el = document.getElementById('ct-' + id);
        var ok = checkFn(el.value.trim());
        g.classList.toggle('has-error', !ok);
        return ok;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var okName    = validate('name',    function(v){ return v.length >= 2; });
        var okEmail   = validate('email',   function(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); });
        var okMessage = validate('message', function(v){ return v.length >= 5; });
        if (okName && okEmail && okMessage) {
            fwrap.style.display = 'none';
            thanks.style.display = 'block';
        }
    });
})();
</script>
